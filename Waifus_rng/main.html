<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Anime Girl RNG - Premium GUI</title>
<style>
body {
    margin: 0;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(160deg, #2b2b2b, #3b0066);
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    color: white;
}

/* SOUL BUTTON */
#rollBtn {
    width: 160px;
    height: 160px;
    margin-top: 40px;
    border-radius: 50%;
    border: none;
    background: url("soul.jpeg") center/cover no-repeat;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 20px rgba(255,255,255,0.1) inset;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}
#rollBtn:hover { transform: scale(1.05); }

/* STATS PANEL */
#stats {
    margin-top: 15px;
    text-align: center;
    font-size: 16px;
    line-height: 1.4;
}

/* OVERLAY */
#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

/* CARD PANEL */
#card {
    background: rgba(30,30,30,0.75);
    backdrop-filter: blur(12px) saturate(180%) contrast(120%);
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    min-width: 320px;
}
#card img {
    width: 260px;
    height: 360px;
    object-fit: cover;
    border-radius: 14px;
    margin-bottom: 10px;
    box-shadow: 0 0 25px rgba(255,255,255,0.2);
}
#chance {
    font-weight: bold;
    margin-bottom: 12px;
    font-size: 18px;
}

/* CLAIM */
#claimBtn {
    padding: 10px 24px;
    border-radius: 15px;
    border: none;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(8px);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s ease, background 0.2s ease;
}
#claimBtn:hover { transform: scale(1.05); }
#claimBtn.show { display: inline-block; }
#claimBtn { display: none; }

/* POPUP STYLE (Index i Equipment) */
.popup {
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.6);
    z-index: 20;
}
.popupContent {
    background: rgba(30,30,30,0.8);
    backdrop-filter: blur(16px) saturate(180%);
    border-radius: 25px;
    padding: 20px;
    width: 90%;
    max-width: 700px;
    max-height: 70%;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* CLOSE BUTTON X */
.closeBtn {
    background: none;
    border: none;
    color: white;
    font-weight: bold;
    font-size: 32px;
    cursor: pointer;
    margin-left: auto;
}

/* CARD ROW */
.cardRow {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}
.cardItem {
    width: 80px;
    height: 110px;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    margin: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: default;
    transition: background 0.2s ease, transform 0.2s ease;
}
.cardItem.unlocked {
    background: rgba(255,255,255,0.1);
    cursor: pointer;
}
.cardItem:hover.unlocked { transform: scale(1.05); }
.cardItem img {
    width: 60px;
    height: 80px;
    border-radius: 10px;
    object-fit: contain;
    display: none;
}
.cardItem.unlocked img { display: block; }
.cardItem span {
    font-size: 10px;
    text-align: center;
    margin-top: 3px;
}

/* PREVIEW MODAL */
#previewModal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 30;
}
#previewContent {
    background: rgba(40,40,40,0.8);
    backdrop-filter: blur(16px) saturate(180%);
    border-radius: 25px;
    padding: 20px;
    text-align: center;
    max-width: 420px;
}
#previewContent img {
    width: 100%;
    height: auto;
    max-height: 360px;
    border-radius: 15px;
    margin-bottom: 15px;
}

/* DOCK */
#dock {
    position: fixed;
    bottom: 15px;
    width: 95%;
    max-width: 700px;
    height: 70px;
    background: rgba(50,50,50,0.6);
    backdrop-filter: blur(18px) saturate(180%);
    border-radius: 35px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    box-shadow: 0 -10px 30px rgba(0,0,0,0.6);
}
.dockBtn {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 14px;
    color: white;
    cursor: pointer;
}
.dockBtn span { margin-top: 4px; font-size: 12px; }

/* SLOT WYPOZYCZONEJ DZIEWCZYNY */
#equippedSlot {
    position:fixed;
    right:10px; top:50%;
    transform:translateY(-50%);
    width:140px; height:200px;
    background: rgba(30,30,30,0.7);
    backdrop-filter: blur(12px) saturate(180%);
    border-radius:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:10px;
    z-index:15;
}
#equippedImg {
    width:100px; height:140px;
    background:rgba(0,0,0,0.2);
    border-radius:12px;
    margin-bottom:8px;
}
#equippedInfo { font-size:12px; text-align:center; }
#unequipBtn {
    margin-top:6px;
    padding:4px 8px;
    border-radius:8px;
    border:none;
    background:rgba(255,255,255,0.2);
    color:white;
    cursor:pointer;
}
</style>
</head>
<body>

<!-- ROLL BUTTON -->
<button id="rollBtn"></button>

<!-- STATS PANEL -->
<div id="stats">
    Rolls: 0<br>
    Coins: 0<br>
    Luck: 10000x<br>
    Best Roll: -
</div>

<!-- OVERLAY CARD -->
<div id="overlay">
    <div id="card">
        <img id="girlImg" src="">
        <div id="chance">Rolling...</div>
        <button id="claimBtn">CLAIM</button>
    </div>
</div>

<!-- POPUP INDEX -->
<div id="indexPopup" class="popup">
    <div class="popupContent">
        <div style="width:100%; display:flex; justify-content:flex-end;">
            <button id="closeIndexBtn" class="closeBtn">×</button>
        </div>
        <h2>Index</h2>
        <div class="cardRow" id="cardRow"></div>
    </div>
</div>

<!-- POPUP EQUIPMENT -->
<div id="equipmentPopup" class="popup">
    <div class="popupContent">
        <div style="width:100%; display:flex; justify-content:flex-end;">
            <button id="closeEquipmentBtn" class="closeBtn">×</button>
        </div>
        <h2>Ekwipunek</h2>
        <div class="cardRow" id="equipmentRow"></div>
    </div>
</div>

<!-- PREVIEW MODAL -->
<div id="previewModal">
    <div id="previewContent">
        <img id="previewImg" src="">
        <div id="previewInfo"></div>
        <button onclick="closePreview()" style="margin-top:12px;padding:8px 20px;border-radius:12px;border:none;background:rgba(255,255,255,0.2);color:white;cursor:pointer;">Zamknij</button>
    </div>
</div>

<!-- DOCK -->
<div id="dock">
    <div class="dockBtn" id="shopBtn">🏪<span>Sklep</span></div>
    <div class="dockBtn" id="inventoryBtn">🎒<span>Ekwipunek</span></div>
    <div class="dockBtn" id="prestigeBtn">⭐<span>Prestige</span></div>
    <div class="dockBtn" id="indexBtn">📖<span>Index</span></div>
</div>

<!-- SLOT WYPOZYCZONEJ DZIEWCZYNY -->
<div id="equippedSlot">
    <div id="equippedImg"></div>
    <div id="equippedInfo">Brak</div>
    <button id="unequipBtn">Zdejmij</button>
</div>

<script>
// ELEMENTY
const rollBtn = document.getElementById("rollBtn");
const overlay = document.getElementById("overlay");
const girlImg = document.getElementById("girlImg");
const chanceText = document.getElementById("chance");
const claimBtn = document.getElementById("claimBtn");
const stats = document.getElementById("stats");
const previewModal = document.getElementById("previewModal");
const previewImg = document.getElementById("previewImg");
const previewInfo = document.getElementById("previewInfo");

// POPUPY
const indexPopup = document.getElementById("indexPopup");
const cardRow = document.getElementById("cardRow");
const closeIndexBtn = document.getElementById("closeIndexBtn");

const equipmentPopup = document.getElementById("equipmentPopup");
const equipmentRow = document.getElementById("equipmentRow");
const closeEquipmentBtn = document.getElementById("closeEquipmentBtn");
const inventoryBtn = document.getElementById("inventoryBtn");

// DOCK
const indexBtn = document.getElementById("indexBtn");

// SLOT WYPOZYCZONEJ DZIEWCZYNY
const equippedImg = document.getElementById("equippedImg");
const equippedInfo = document.getElementById("equippedInfo");
const unequipBtn = document.getElementById("unequipBtn");

// STATYSTYKI
let rollsCount = 0;
let luckMultiplier = 10000;
let bestRoll = null;
let coins = 0;

// WYPOZYCZONA DZIEWCZYNA
let equippedGirl = null;

// POOL RARITIES
const pool = [
    { img: "girl1.jpg", chance: 2, name: "Common" },
    { img: "girl2.jpg", chance: 4, name: "Uncommon" },
    { img: "girl3.jpg", chance: 8, name: "Rare" },
    { img: "girl4.jpg", chance: 16, name: "Epic" },
    { img: "girl5.jpg", chance: 32, name: "Legendary" },
    { img: "girl6.jpg", chance: 64, name: "Mythic" },
    { img: "girl7.jpg", chance: 128, name: "Celestial" },
    { img: "girl8.jpg", chance: 256, name: "Divine" },
    { img: "girl9.jpg", chance: 512, name: "Transcendent" },
    { img: "girl10.jpg", chance: 1024, name: "Restricted" },
    { img: "girl11.jpg", chance: 2048, name: "Cosmic" },
    { img: "girl12.jpg", chance: 4096, name: "Exotic" },
    { img: "girl13.jpg", chance: 8192, name: "Exceptional" },
    { img: "girl14.jpg", chance: 16384, name: "Superior" },
    { img: "girl15.jpg", chance: 32768, name: "Omniversal" },
    { img: "girl16.jpg", chance: 65536, name: "Secret" },
    { img: "girl17.jpg", chance: 131072, name: "Pearlescent" },
    { img: "girl18.jpg", chance: 262144, name: "Effervescent" },
    { img: "girl19.jpg", chance: 524288, name: "Seraph" },
    { img: "girl20.jpg", chance: 1048576, name: "Phosphene" }
];

// UNLOCKED & EQUIPMENT
const unlocked = new Set();
const equipment = {}; // {img: {...card,count}}

// FUNKCJE
function getLuckMultiplier(card){
    // Mnożnik: (log2(chance/16)+1), tylko dla chance>=16
    if(card.chance<16) return 0;
    return Math.floor(Math.log2(card.chance/16))+1;
}

function equipGirl(card){
    equippedGirl = card;
    equippedImg.style.backgroundImage=`url(${card.img})`;
    equippedImg.style.backgroundSize="cover";
    equippedInfo.textContent=`${card.name}\n1 in ${card.chance}\n+${getLuckMultiplier(card)} Luck`;
    updateStats();
}

function unequipGirl(){
    equippedGirl = null;
    equippedImg.style.backgroundImage="";
    equippedInfo.textContent="Brak";
    updateStats();
}

function updateStats(){
    let luck = luckMultiplier;
    if(equippedGirl) luck += getLuckMultiplier(equippedGirl);
    stats.innerHTML=`Rolls: ${rollsCount}<br>
                     Coins: ${coins}<br>
                     Luck: ${luck}x<br>
                     Best Roll: ${bestRoll?`1 in ${bestRoll.chance} (${bestRoll.name})`:'-'}`;
}

function addToEquipment(card){
    if(equipment[card.img]) equipment[card.img].count++;
    else equipment[card.img] = {...card,count:1};
}

function finalRoll(){
    let totalWeight=0;
    pool.forEach(p=>totalWeight+=1/p.chance);
    const r = Math.random()*totalWeight;
    let sum=0;
    for(let i=0;i<pool.length;i++){
        sum+=1/pool[i].chance;
        if(r<=sum){
            unlocked.add(pool[i].img);
            addToEquipment(pool[i]);
            coins += Math.floor(pool[i].chance/2);
            if(!bestRoll || pool[i].chance>bestRoll.chance) bestRoll=pool[i];
            return pool[i];
        }
    }
    return pool[0];
}

function roll(){
    rollBtn.disabled = true;
    claimBtn.style.display = "none";
    overlay.style.display = "flex";
    chanceText.textContent = "Rolling...";
    rollsCount++;

    let ticks = 0;
    const fakeRoll = setInterval(()=>{
        const r = pool[Math.floor(Math.random()*pool.length)];
        girlImg.src = r.img;
        // Wyświetlamy dynamiczny tekst z szansą i nazwą
        chanceText.textContent = `Rolling... 1 in ${r.chance} (${r.name})`;
        girlImg.style.transform = `scale(${1 + Math.sin(ticks/2)*0.03})`;
        ticks++;
    }, 80);

    setTimeout(()=>{
        clearInterval(fakeRoll);

        // Obliczamy efektywny mnożnik szczęścia
        const totalLuck = luckMultiplier + (equippedGirl ? getLuckMultiplier(equippedGirl) : 0);

        // Modyfikujemy finalRoll, aby uwzględniał totalLuck
        let totalWeight = 0;
        pool.forEach(p => {
            totalWeight += 1 / Math.max(1, p.chance / totalLuck);
        });
        const r = Math.random() * totalWeight;
        let sum = 0;
        let drop = pool[0];
        for(let i=0; i<pool.length; i++){
            const effectiveChance = Math.max(1, pool[i].chance / totalLuck);
            sum += 1 / effectiveChance;
            if(r <= sum){
                drop = pool[i];
                unlocked.add(drop.img);
                addToEquipment(drop);
                coins += Math.floor(drop.chance/2);
                if(!bestRoll || drop.chance > bestRoll.chance) bestRoll = drop;
                break;
            }
        }

        girlImg.src = drop.img;
        chanceText.textContent = `You rolled: 1 in ${drop.chance} (${drop.name})`;
        girlImg.style.transform = "scale(1)";
        claimBtn.style.display = "inline-block";
        rollBtn.disabled = false;
        updateStats();
    }, 2000);
}
// CLAIM
claimBtn.addEventListener("click",()=>{overlay.style.display="none";});

// INDEX POPUP
indexBtn.addEventListener("click",()=>{
    cardRow.innerHTML="";
    pool.forEach(p=>{
        const item=document.createElement("div");
        item.className="cardItem"+(unlocked.has(p.img)?" unlocked":"");
        const img=document.createElement("img");
        img.src=p.img;
        const span=document.createElement("span");
        const multiplier = getLuckMultiplier(p);
        span.textContent=unlocked.has(p.img)?`${p.name}\n+${multiplier} Luck`:`1 in ${p.chance} (${p.name})`;
        item.appendChild(img);
        item.appendChild(span);

        if(unlocked.has(p.img)){
            item.addEventListener("click",()=>{
                previewImg.src=p.img;
                previewInfo.textContent=`${p.name} - Szansa 1 in ${p.chance}\n+${multiplier} Luck`;
                previewModal.style.display="flex";
                equipGirl(p); // kliknięcie w Index od razu equipuje dziewczynę
            });
        }
        cardRow.appendChild(item);
    });
    indexPopup.style.display="flex";
});
closeIndexBtn.addEventListener("click",()=>{indexPopup.style.display="none";});

// EQUIPMENT POPUP
inventoryBtn.addEventListener("click",()=>{
    equipmentRow.innerHTML="";
    Object.values(equipment).forEach(card=>{
        const item=document.createElement("div");
        item.className="cardItem unlocked";
        const img=document.createElement("img");
        img.src=card.img;
        const span=document.createElement("span");
        span.textContent=`${card.name} x${card.count}`;
        item.appendChild(img);
        item.appendChild(span);
        item.addEventListener("click",()=>{
            previewImg.src=card.img;
            previewInfo.textContent=`${card.name} - Szansa 1 in ${card.chance}\n+${getLuckMultiplier(card)} Luck`;
            previewModal.style.display="flex";
        });
        equipmentRow.appendChild(item);
    });
    equipmentPopup.style.display="flex";
});
closeEquipmentBtn.addEventListener("click",()=>{equipmentPopup.style.display="none";});

// PREVIEW MODAL
function closePreview(){previewModal.style.display="none";}

// UNEQUIP BUTTON
unequipBtn.addEventListener("click",unequipGirl);

// ROLL BUTTON
rollBtn.addEventListener("click",roll);

</script>
</body>
</html>
